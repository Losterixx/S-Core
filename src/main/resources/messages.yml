# S-Core v1.0 by Losterixx
#
# This plugin utilizes MiniMessage for messages.
# For more information, visit https://docs.adventure.kyori.net/minimessage.html

file-version: 1

general:
  noPlayer: "<gray>Dies können <red>nur Spieler<gray>!"
  noPerms: "<gray>Hierzu hast du <red>keine Berechtigung<gray>!"
  playerNotFound: "<gray>Der angegebene Spieler <red>konnte nicht gefunden werden<gray>!"

commands:
  score:
    usage: "<gray>Bitte nutze <red>/score <about/reload><gray>!"
    about: "<gray>S-Core v%version% <dark_gray>- <gray>Losterixx"
    reload:
      reloading: "<gray>Alle Konfigurations-Dateien <yellow>werden neugeladen <gray>..."
      reloaded: "<gray>Alle Konfigurations-Dateien wurden in %time%s <green>neugeladen<gray>!"
  setspawn:
    usage: "<gray>Bitte nutze <red>/setspawn<gray>!"
    set: "<gray>Der <yellow>Spawn <gray>wurde gesetzt!"
  spawn:
    teleported: "<gray>Du wurdest zum <yellow>Spawn <gray>teleportiert!"
    noSpawnSet: "<gray>Der <yellow>Spawn <gray>wurde <red>noch nicht gesetzt<gray>!"
    sound:
      enabled: true
      name: "ENTITY_ENDERMAN_TELEPORT"
      volume: 1.0
      pitch: 1.0
  broadcast:
    usage: "<gray>Bitte nutze <red>/broadcast <Nachricht><gray>!"
    sent: "<gray>Die Nachricht <yellow>%messageId% <gray>wurde <green>gesendet<gray>!"
    notFound: "<gray>Die Nachricht <yellow>%messageId% <gray>konnte <red>nicht gefunden werden<gray>!"
  invsee:
    usage: "<gray>Bitte nutze <red>/invsee <Spieler><gray>!"
    cannotUseOnSelf: "<gray>Um dein eigenes Inventar zu sehen, <red>nutze '<key:key.inventory>'<gray>!"
  endersee:
    usage: "<gray>Bitte nutze <red>/endersee <Spieler><gray>!"
    cannotUseOnSelf: "<gray>Um deine eigene Endertruhe zu sehen, <red>nutze eine Enderchest<gray>!"
  extrasee:
    usage: "<gray>Bitte nutze <red>/extrasee <Spieler><gray>!"
    cannotUseOnSelf: "<gray>Um dein eigenes Inventar zu sehen, <red>nutze '<key:key.inventory>'<gray>!"
  setwarp:
    usage: "<gray>Bitte nute <red>/setwarp <Name><gray>!"
    set: "<gray>Der Warp <yellow>%warp% <gray>wurde gesetzt!"
    alreadyExists: "<gray>Der Warp <yellow>%warp% <gray>existiert <red>bereits<gray>!"
  warp:
    usage: "<gray>Bitte nutze <red>/warp <Name><gray>!"
    notFound: "<gray>Der Warp <yellow>%warp% <gray>konnte <red>nicht gefunden werden<gray>!"
    teleported: "<gray>Du wurdest zum Warp <yellow>%warp% <gray>teleportiert!"
    locNotFound: "<gray>Die Position des Warps <yellow>%warp% <gray>konnte <red>nicht gefunden werden<gray>!"
    sound:
      enabled: true
      name: "ENTITY_ENDERMAN_TELEPORT"
      volume: 1.0
      pitch: 1.0
  delwarp:
    usage: "<gray>Bitte nutze <red>/delwarp <Name><gray>!"
    notFound: "<gray>Der Warp <yellow>%warp% <gray>konnte <red>nicht gefunden werden<gray>!"
    deleted: "<gray>Der Warp <yellow>%warp% <gray>wurde <red>gelöscht<gray>!"
  listwarps:
    usage: "<gray>Bitte nutze <red>/listwarps<gray>!"
    noWarps: "<gray>Es sind <red>keine Warps <gray>gesetzt!"
    header: "<newline><gray>Warps:"
    entry: "<dark_gray> - <white>%warp%<gray>"
    footer: " "
  gamemode:
    usage: "<gray>Bitte nutze <red>/gamemode <0/1/2/3> <Spieler><gray>!"
    changed-self: "<gray>Dein Spielmodus wurde auf <yellow>%gamemode% <gray>geändert!"
    changed-other: "<gray>Der Spielmodus von <yellow>%player% <gray>wurde auf <yellow>%gamemode% <gray>geändert!"
    gamemodes:
      survival: "Überlebens-Modus"
      creative: "Kreativ-Modus"
      adventure: "Abenteuer-Modus"
      spectator: "Zuschauer-Modus"
  discord:
    usage: "<gray>Bitte nutze <red>/discord<gray>!"
    messages:
      - " "
      - "<gray>Unser Discord-Server: <yellow><underlined>discord.gg/example</underlined><gray>!"
      - " "
  vote:
    usage: "<gray>Bitte nutze <red>/vote<gray>!"
    messages:
      - " "
      - "<gray>Unser Vote-Link: <yellow><underlined>vote.example.com</underlined><gray>!"
      - " "
  website:
    usage: "<gray>Bitte nutze <red>/webiste<gray>!"
    messages:
      - " "
      - "<gray>Unsere Webiste: <yellow><underlined>www.example.com</underlined><gray>!"
      - " "
