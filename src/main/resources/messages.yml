# S-Core v1.0 by Losterixx
#
# This plugin utilizes MiniMessage for messages.
# For more information, visit https://docs.adventure.kyori.net/minimessage.html

file-version: 1

general:
  noPlayer: "<gray>Dies können <red>nur Spieler<gray>!"
  noPerms: "<gray>Hierzu hast du <red>keine Berechtigung<gray>!"
  playerNotFound: "<gray>Der angegebene Spieler <red>konnte nicht gefunden werden<gray>!"

commands:
  score:
    usage: "<gray>Bitte nutze <red>/score <about/reload><gray>!"
    about: "<gray>S-Core v%version% <dark_gray>- <gray>Losterixx"
    reload:
      reloading: "<gray>Alle Konfigurations-Dateien <yellow>werden neugeladen <gray>..."
      reloaded: "<gray>Alle Konfigurations-Dateien wurden in %time%s <green>neugeladen<gray>!"
  setspawn:
    usage: "<gray>Bitte nutze <red>/setspawn<gray>!"
    set: "<gray>Der <yellow>Spawn <gray>wurde gesetzt!"
  spawn:
    teleported: "<gray>Du wurdest zum <yellow>Spawn <gray>teleportiert!"
    noSpawnSet: "<gray>Der <yellow>Spawn <gray>wurde <red>noch nicht gesetzt<gray>!"
    sound:
      enabled: true
      name: "ENTITY_ENDERMAN_TELEPORT"
      volume: 1.0
      pitch: 1.0
  broadcast:
    usage: "<gray>Bitte nutze <red>/broadcast <Nachricht><gray>!"
    sent: "<gray>Die Nachricht <yellow>%messageId% <gray>wurde <green>gesendet<gray>!"
    notFound: "<gray>Die Nachricht <yellow>%messageId% <gray>konnte <red>nicht gefunden werden<gray>!"