# S-Core v1.0 by Losterixx
#
# This plugin utilizes MiniMessage for messages.
# For more information, visit https://docs.adventure.kyori.net/minimessage.html

file-version: 1

# The prefix before every message
prefix: "<gradient:#2D734E:#4DC484><b>V-S-Core</b> <dark_gray>⚡ <gray>"

# Settings for the /lobby command
lobbyCommand:
  # Toggle the /lobby command
  enabled: true
   # The server to connect to when using the /lobby command
  lobbyServer: "Lobby"
  # The aliases for the /lobby command
  # Set to 'aliases: []' to disable aliases
  aliases:
    - "hub"
    - "l"