name: S-Core
version: '1.0'
main: dev.losterixx.sCore.Main
api-version: '1.21'
authors: [ Losterixx ]
description: -/-
softdepend:
  - PlaceholderAPI
commands:
  sCore:
    description: Main plugin command
    aliases:
      - sc
  setspawn:
    description: Set the server spawn
  spawn:
    description: Teleport to the server spawn
  broadcast:
    description: Broadcast messages
  invsee:
    description: Show/Modify other players inventory
    aliases:
      - invs
permissions:
  "sCore.admin":
    description: Permission to access plugin main command
    default: op
  "sCore.command.setspawn":
    description: Permission to set the server spawn
    default: op
  "sCore.command.spawn":
    description: Permission to teleport to the server spawn
    default: op
  "sCore.command.broadcast":
    description: Permission to broadcast messages
    default: op
  "sCore.command.invsee.show":
    description: Permission to show other players inventory
    default: op
  "sCore.command.invsee.modify":
    description: Permission to modify other players inventory
    default: op